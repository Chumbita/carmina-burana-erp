services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: carmina-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
    stdin_open: true
    tty: true
    networks:
      - carmina-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: carmina-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///./sql_app.db
    networks:
      - carmina-network

networks:
  carmina-network:
    driver: bridge